tasks:
  # UAS: listens, answers, receives re-INVITE
  - name: pjsua-uas
    image: pjsua-test
    daemon: true
    args:
      - "--mode=uas"
      - "--port=15083"
      - "--rtp-port=18800"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=10"
      - "--tolerance=90"

  # UAC: connects, sends re-INVITE at 3s, hangs up at 10s
  - name: pjsua-uac
    image: pjsua-test
    require:
      - { started: pjsua-uas }
    args:
      - "--mode=uac"
      - "--proxy=127.0.0.1:15083"
      - "--rtp-port=19800"
      - "--tls-ca-file=/home/certs/cacert.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=10"
      - "--tolerance=90"
      - "--reinvite-by=uac"
      - "--reinvite-delay=3"
