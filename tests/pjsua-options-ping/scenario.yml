tasks:
  # UAS: listens, answers, auto-replies to OPTIONS
  - name: pjsua-uas
    image: pjsua-test
    daemon: true
    args:
      - "--mode=uas"
      - "--port=15085"
      - "--rtp-port=19000"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=10"
      - "--tolerance=0"
      - "--options-auto-reply"

  # UAC: connects, sends OPTIONS every 2s
  - name: pjsua-uac
    image: pjsua-test
    require:
      - { started: pjsua-uas }
    args:
      - "--mode=uac"
      - "--proxy=127.0.0.1:15085"
      - "--rtp-port=19100"
      - "--tls-ca-file=/home/certs/cacert.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=10"
      - "--tolerance=0"
      - "--options-ping=2"
      - "--options-tolerance=80"
