tasks:
  # 1. UAC + TLS Server: listens on TLS port 15061, waits for TLS client,
  #    then sends INVITE back through the same TLS connection
  - name: uac-tls-server
    image: pjsua-test
    daemon: true
    args:
      - "--mode=uac-tls-server"
      - "--proxy=127.0.0.1:15062"
      - "--port=15061"
      - "--rtp-port=16000"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=5"
      - "--tls-wait=15"
      - "--tolerance=90"

  # 2. UAS + TLS Client: listens on TLS port 15062 (for Contact header),
  #    connects to uac-tls-server TLS port 15061 as client,
  #    sends probe to signal TLS is up, then waits for real INVITE
  - name: uas-tls-client
    image: pjsua-test
    require:
      - { started: uac-tls-server }
    args:
      - "--mode=uas-tls-client"
      - "--proxy=127.0.0.1:15061"
      - "--port=15062"
      - "--rtp-port=17000"
      - "--tls-ca-file=/home/certs/cacert.pem"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=10"
      - "--tolerance=90"
      - "--wait-timeout=20"
