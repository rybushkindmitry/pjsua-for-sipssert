tasks:
  # UAS: listens, answers, sends BYE after duration
  - name: pjsua-uas
    image: pjsua-test
    daemon: true
    args:
      - "--mode=uas"
      - "--port=15081"
      - "--rtp-port=18600"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=5"
      - "--tolerance=90"
      - "--bye=uas"

  # UAC: connects, waits for BYE from UAS
  - name: pjsua-uac
    image: pjsua-test
    require:
      - { started: pjsua-uas }
    args:
      - "--mode=uac"
      - "--proxy=127.0.0.1:15081"
      - "--rtp-port=19600"
      - "--tls-ca-file=/home/certs/cacert.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=5"
      - "--tolerance=90"
      - "--bye=uas"
      - "--wait-bye=15"
