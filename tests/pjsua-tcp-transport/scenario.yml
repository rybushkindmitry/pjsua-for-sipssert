tasks:
  - name: uas
    image: pjsua-test
    daemon: true
    args:
      - "--mode=uas"
      - "--transport=tcp"
      - "--port=15112"
      - "--rtp-port=22100"
      - "--duration=10"
      - "--tolerance=0"
      - "--set-header=X-Reply: tcp-ok"
      - "--expect-header=X-Test"
      - "--expect-header-value=X-Test: tcp-hello"

  - name: uac
    image: pjsua-test
    require:
      - { started: uas }
    args:
      - "--mode=uac"
      - "--transport=tcp"
      - "--proxy=127.0.0.1:15112"
      - "--rtp-port=23100"
      - "--duration=5"
      - "--tolerance=0"
      - "--set-header=X-Test: tcp-hello"
      - "--expect-header=X-Reply"
      - "--expect-header-value=X-Reply: tcp-ok"
