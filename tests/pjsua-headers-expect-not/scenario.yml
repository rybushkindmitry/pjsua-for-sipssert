tasks:
  - name: uas
    image: pjsua-test
    daemon: true
    args:
      - "--mode=uas"
      - "--port=15093"
      - "--rtp-port=18700"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=10"
      - "--tolerance=0"
      - "--expect-no-header=X-Secret"
      - "--expect-no-header=X-Internal"

  - name: uac
    image: pjsua-test
    require:
      - { started: uas }
    args:
      - "--mode=uac"
      - "--proxy=127.0.0.1:15093"
      - "--rtp-port=19700"
      - "--tls-ca-file=/home/certs/cacert.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=5"
      - "--tolerance=0"
