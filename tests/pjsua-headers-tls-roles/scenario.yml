tasks:
  - name: uac-tls-server
    image: pjsua-test
    daemon: true
    args:
      - "--mode=uac-tls-server"
      - "--proxy=127.0.0.1:15100"
      - "--port=15099"
      - "--rtp-port=20000"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=5"
      - "--tls-wait=15"
      - "--tolerance=90"
      - "--set-header=X-From-Server: hello"
      - "--expect-header=X-From-Client"
      - "--expect-header-value=X-From-Client: world"

  - name: uas-tls-client
    image: pjsua-test
    require:
      - { started: uac-tls-server }
    args:
      - "--mode=uas-tls-client"
      - "--proxy=127.0.0.1:15099"
      - "--port=15100"
      - "--rtp-port=21000"
      - "--tls-ca-file=/home/certs/cacert.pem"
      - "--tls-cert-file=/home/certs/cacert.pem"
      - "--tls-privkey-file=/home/certs/cakey.pem"
      - "--srtp=mandatory"
      - "--srtp-secure=0"
      - "--duration=10"
      - "--tolerance=90"
      - "--wait-timeout=20"
      - "--set-header=X-From-Client: world"
      - "--expect-header=X-From-Server"
      - "--expect-header-value=X-From-Server: hello"
